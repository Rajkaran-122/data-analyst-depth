# version: '3.8' (Removed as it is obsolete)

services:
  # ----------------------------------------------------------------
  # 1. DATABASE (PostgreSQL)
  # ----------------------------------------------------------------
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-app}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network

  # ----------------------------------------------------------------
  # 2. CACHE & QUEUE (Redis)
  # ----------------------------------------------------------------
  redis:
    image: redis:7-alpine
    restart: always
    networks:
      - app-network

  # ----------------------------------------------------------------
  # 3. BACKEND API (FastAPI)
  # ----------------------------------------------------------------
  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    volumes:
      - ./backend/app:/app/app
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-user}:${POSTGRES_PASSWORD:-password}@db:5432/${POSTGRES_DB:-app}
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY:-changeme}
    depends_on:
      - db
      - redis
    networks:
      - app-network

  # ----------------------------------------------------------------
  # 4. FRONTEND (React + Nginx)
  # ----------------------------------------------------------------
  frontend:
    build:
      context: ./frontend-pro
      dockerfile: Dockerfile.frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  postgres_data:
