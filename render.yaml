services:
  - type: web
    name: data-analyst-backend
    env: docker
    dockerContext: backend
    dockerfilePath: Dockerfile
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: data-analyst-db
          property: connectionString
      - key: CORS_ORIGINS
        value: "https://data-analyst-depth.vercel.app"
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: GOOGLE_API_KEY
        sync: false # Set in Render Dashboard
      - key: GEMINI_API_KEY
        sync: false # Set in Render Dashboard

databases:
  - name: data-analyst-db
    plan: free
    databaseName: data_analyst
    user: admin
