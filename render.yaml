services:
  - type: web
    name: data-analyst-prod-api
    env: docker
    dockerContext: backend
    dockerfilePath: backend/Dockerfile
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        sync: false # Set this in the Render dashboard to your existing DB URL
      - key: CORS_ORIGINS
        value: "https://data-analyst-depth.vercel.app"
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: GOOGLE_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
