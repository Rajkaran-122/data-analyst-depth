services:
  - type: web
    name: data-analyst-prod-api
    env: docker
    dockerContext: .
    dockerfilePath: backend/Dockerfile
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: data-analyst-db
          property: connectionString
      - key: CORS_ORIGINS
        value: "https://data-analyst-depth.vercel.app"
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: GOOGLE_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false

databases:
  - name: data-analyst-db
    plan: free
    databaseName: data_analyst_db
    user: admin_user
